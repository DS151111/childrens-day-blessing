<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 六一儿童节快乐 🎀</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #ffc0cb 0%, #ff69b4 50%, #ff1493 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 花瓣飘落动画 */
        .petal {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50% 0 50% 0;
            animation: fall linear infinite;
            pointer-events: none;
        }

        @keyframes fall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* 星星闪烁 */
        .star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* 主卡片 */
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(255, 105, 180, 0.4);
            max-width: 600px;
            text-align: center;
            animation: float 3s ease-in-out infinite;
            position: relative;
            z-index: 10;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            color: #ff1493;
            font-size: 3em;
            margin-bottom: 20px;
            animation: rainbow 3s linear infinite;
        }

        @keyframes rainbow {
            0% { color: #ff1493; }
            33% { color: #ff69b4; }
            66% { color: #ffc0cb; }
            100% { color: #ff1493; }
        }

        .emoji {
            font-size: 4em;
            animation: bounce 1s ease-in-out infinite;
            display: inline-block;
            margin: 20px 0;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .message {
            font-size: 1.3em;
            color: #666;
            line-height: 1.8;
            margin: 30px 0;
            padding: 20px;
            background: linear-gradient(135deg, #fff0f5 0%, #ffe4e1 100%);
            border-radius: 15px;
            border: 2px solid #ffb6c1;
        }

        .heart {
            color: #ff1493;
            font-size: 1.5em;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #ff69b4 0%, #ff1493 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.2em;
            margin-top: 20px;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(255, 20, 147, 0.4);
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 30px rgba(255, 20, 147, 0.6);
        }

        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 0.9em;
        }

        audio {
            display: none;
        }
    </style>
</head>
<body>
    <!-- 背景音乐 -->
    <audio autoplay loop>
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.wav" type="audio/wav">
    </audio>

    <!-- 花瓣 -->
    <script>
        for (let i = 0; i < 30; i++) {
            const petal = document.createElement('div');
            petal.classList.add('petal');
            petal.style.left = Math.random() * 100 + '%';
            petal.style.animationDuration = (Math.random() * 5 + 5) + 's';
            petal.style.animationDelay = Math.random() * 5 + 's';
            document.body.appendChild(petal);
        }

        // 星星
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(star);
        }
    </script>

    <!-- 主卡片 -->
    <div class="card">
        <div class="emoji">🎀✨🎈</div>
        <h1>🎉 六一儿童节快乐 🎉</h1>
        <div class="emoji">🌸🦋🌷</div>
        
        <div class="message">
            <span class="heart">💖</span><br><br>
            <strong>六一快乐，开心果！</strong><br><br>
            愿你永远保持天真烂漫，<br>
            永远有糖吃，<br>
            永远被偏爱。<br><br>
            <span class="heart">💖</span><br><br>
            <em>你永远是我的心头宝，<br>
            儿童节快乐，我的开心果！</em><br><br>
            <strong>—— 永远爱你的我</strong><br><br>
            <span class="heart">💖</span>
        </div>

        <a href="#" class="btn" onclick="showLove()">💝 点击接收祝福 💝</a>
        
        <div class="footer">
            <p>🌸 2026.06.01 🌸</p>
            <p>专属你的六一儿童节祝福</p>
        </div>
    </div>

    <script>
        function showLove() {
            alert('💖 六一儿童节快乐！\n\n愿你的生活像这朵花一样美丽，\n愿你的笑容像星星一样灿烂！\n\n永远爱你的我 💖');
            
            // 撒花特效
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.style.position = 'fixed';
                confetti.style.width = '10px';
                confetti.style.height = '10px';
                confetti.style.background = ['#ff1493', '#ff69b4', '#ffc0cb', '#ffb6c1'][Math.floor(Math.random() * 4)];
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = '-10px';
                confetti.style.borderRadius = '50%';
                confetti.style.animation = `fall ${Math.random() * 3 + 2}s linear forwards`;
                document.body.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 5000);
            }
        }

        // 添加撒花动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fall {
                to {
                    transform: translateY(100vh) rotate(360deg);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
